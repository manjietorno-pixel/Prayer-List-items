<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UCC Pasay – Prayer Requests</title>
<style>
:root {
  --navy:  #0C447C;
  --royal: #185FA5;
  --blue:  #378ADD;
  --sky:   #85B7EB;
  --pale:  #B5D4F4;
  --frost: #E6F1FB;
  --bg:    #F0F6FF;
  --white: #FFFFFF;
  --text:  #1a2a3a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); -webkit-tap-highlight-color: transparent; }

.app { display: flex; flex-direction: column; height: 100dvh; height: 100vh; max-width: 480px; margin: 0 auto; }

.hdr { flex-shrink: 0; background: var(--navy); padding: 10px 16px 8px; text-align: center; }
.hdr-org  { font-size: 9px; letter-spacing: 0.12em; color: var(--sky); text-transform: uppercase; margin-bottom: 2px; }
.hdr-name { font-size: 17px; font-weight: 700; color: #fff; }

.tab-bar { flex-shrink: 0; background: var(--white); border-bottom: 1.5px solid var(--pale); display: flex; gap: 5px; padding: 8px 10px; overflow-x: auto; overflow-y: hidden; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.tab-bar::-webkit-scrollbar { display: none; }
.tab { flex-shrink: 0; display: flex; align-items: center; gap: 5px; padding: 6px 13px; border-radius: 20px; border: 1.5px solid var(--pale); background: var(--frost); color: var(--royal); font-size: 12.5px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.tab.active { background: var(--royal); border-color: var(--royal); color: #fff; }

.content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px 11px 8px; }
.panel { display: none; }
.panel.active { display: block; }

.grp-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--royal); padding: 10px 2px 5px; border-bottom: 1.5px solid var(--pale); margin-bottom: 7px; }
.grp-label:first-child { padding-top: 0; }
.group-block { margin-bottom: 12px; }

.chip-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { display: inline-flex; align-items: center; gap: 2px; font-size: 12.5px; font-weight: 600; color: var(--navy); background: var(--frost); border: 1px solid var(--pale); border-radius: 20px; padding: 5px 12px; }
.chip .xbtn { background: none; border: none; color: #A32D2D; cursor: pointer; font-size: 16px; line-height: 1; padding: 0 0 0 3px; }

.item-row { display: flex; align-items: flex-start; gap: 8px; padding: 9px 11px; background: var(--white); border-radius: 9px; border: 1px solid #EBF3FB; margin-bottom: 5px; }
.dot   { color: var(--blue); font-size: 18px; line-height: 1.1; flex-shrink: 0; }
.label { font-size: 13.5px; flex: 1; line-height: 1.4; }
.item-row .xbtn { background: none; border: none; color: #A32D2D; cursor: pointer; font-size: 18px; line-height: 1; flex-shrink: 0; }

.add-row { display: flex; gap: 6px; margin-top: 9px; padding-top: 9px; border-top: 1px dashed var(--pale); }
.add-row input { flex: 1; padding: 8px 13px; border: 1.5px solid var(--pale); border-radius: 22px; font-size: 13px; color: var(--text); background: white; outline: none; }
.add-row input:focus { border-color: var(--royal); }
.add-row .btn-add { padding: 8px 16px; background: var(--royal); color: white; border: none; border-radius: 22px; font-size: 13px; font-weight: 700; cursor: pointer; }
.edit-notice { background: #FFF8E1; border: 1px solid #FFD54F; border-radius: 8px; padding: 7px 12px; font-size: 12px; color: #6D4C00; text-align: center; margin-bottom: 11px; }

/* Bottom bar — 2 rows */
.btm { flex-shrink: 0; display: flex; flex-direction: column; gap: 7px; padding: 9px 12px; padding-bottom: max(9px, env(safe-area-inset-bottom)); background: white; border-top: 1.5px solid var(--pale); }
.btm-row { display: flex; gap: 7px; }
.btn-copy { flex: 1.4; padding: 11px 8px; background: var(--royal); color: white; border: none; border-radius: 26px; font-size: 13px; font-weight: 700; cursor: pointer; }
.btn-edit { flex: 1; padding: 11px 8px; background: var(--frost); color: var(--royal); border: 1.5px solid var(--pale); border-radius: 26px; font-size: 13px; font-weight: 700; cursor: pointer; }
.btn-edit.on { background: var(--navy); color: white; border-color: var(--navy); }
.btn-pdf { flex: 1; padding: 9px 8px; background: white; color: var(--royal); border: 1.5px solid var(--pale); border-radius: 26px; font-size: 12px; font-weight: 700; cursor: pointer; }
.btn-ppt { flex: 1; padding: 9px 8px; background: white; color: #1a5c30; border: 1.5px solid #8BC4A0; border-radius: 26px; font-size: 12px; font-weight: 700; cursor: pointer; }

.toast { position: fixed; bottom: 115px; left: 50%; transform: translateX(-50%); background: var(--navy); color: white; padding: 10px 22px; border-radius: 24px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; }

/* ═══════════════ PRINT / PDF ═══════════════ */
#printView { display: none; }

@media print {
  @page { size: A4 landscape; margin: 9mm 10mm; }
  html, body { overflow: visible; height: auto; }
  .app, .toast { display: none !important; }

  #printView {
    display: block !important;
    font-family: Arial, Helvetica, sans-serif;
    color: #1a2a3a;
  }
  .ph { text-align: center; margin-bottom: 5mm; padding-bottom: 3mm; border-bottom: 1.5pt solid #185FA5; }
  .ph h1 { font-size: 15pt; font-weight: bold; color: #0C447C; margin: 0 0 1mm; }
  .ph p  { font-size: 9pt; color: #185FA5; margin: 0; }

  .pg { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4mm; align-items: start; }

  .ps { break-inside: avoid; border: 0.5pt solid #B5D4F4; border-radius: 2mm; overflow: hidden; }
  .ps-hdr { background: #185FA5; color: white; padding: 2mm 3mm; font-size: 8pt; font-weight: bold; text-transform: uppercase; letter-spacing: 0.04em; }
  .ps-body { padding: 2mm 3mm; }
  .ps-grp { margin-bottom: 2mm; }
  .ps-grp:last-child { margin-bottom: 0; }
  .ps-glabel { font-size: 6.5pt; font-weight: bold; color: #185FA5; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 0.5pt solid #B5D4F4; padding-bottom: 1mm; margin-bottom: 1.5mm; }
  .ps-chips { display: flex; flex-wrap: wrap; gap: 1.5mm; }
  .ps-chip { font-size: 7.5pt; font-weight: bold; color: #0C447C; background: #E6F1FB; border: 0.5pt solid #85B7EB; border-radius: 3mm; padding: 0.8mm 2.5mm; }
  .ps-item { font-size: 8pt; padding: 0.7mm 0; display: flex; gap: 1.5mm; align-items: flex-start; }
  .ps-dot  { color: #378ADD; font-weight: bold; flex-shrink: 0; }
}
</style>
</head>
<body>

<div class="app">
  <div class="hdr">
    <div class="hdr-org">United Church of Christ in the Philippines — Pasay</div>
    <div class="hdr-name">🙏 Prayer Requests</div>
  </div>
  <div class="tab-bar" id="tabBar"></div>
  <div class="content"  id="content"></div>
  <div class="btm">
    <div class="btm-row">
      <button class="btn-copy" onclick="copyText()">📋 Copy to Share</button>
      <button class="btn-edit" id="editBtn" onclick="toggleEdit()">✏️ Edit</button>
    </div>
    <div class="btm-row">
      <button class="btn-pdf" onclick="printPDF()">🖨️ Print / Save as PDF</button>
      <button class="btn-ppt" onclick="generatePPT()">📊 Download PPT</button>
    </div>
  </div>
</div>

<div id="printView">
  <div class="ph">
    <h1>🙏 UCC Pasay — Prayer Requests</h1>
    <p>Prayer Meeting</p>
  </div>
  <div class="pg" id="printGrid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
var TABS = [
  {id:'family', label:'Family',     icon:'👨‍👩‍👧'},
  {id:'church', label:'Church',     icon:'⛪'},
  {id:'gov',    label:'Government', icon:'🏛️'},
  {id:'economy',label:'Economy',    icon:'💼'},
  {id:'edu',    label:'Education',  icon:'📚'},
  {id:'health', label:'Health',     icon:'❤️'},
  {id:'media',  label:'Media',      icon:'📺'}
];

var DEFAULT = {
  families:["Del Rosario","Torno","Nogaliza Kenner","Mahilum-Buyan","Dela Cruz","Bance","Gimeno-Azarcon","Daraman-Saludes","Pangadlin","Banhao","Hamsinon","Dela Pena","Movido","Talbo-Aldohesa","Banghaon-Esporas","Alday","Ropero","Almazan","Bagayo","Guimbo-Galapon","Roxas","Badbad","Pelinio-Pasigay","Villaceran","Rebada","Enriquez","Ysulan","Dequina","Bacho-Crisostomo","Dalusong Joyce","Padernal","Barrilea-Tugade","Lapara"],
  church:{
    general:  ["UCC Group of Churches","Revival","Personal Encounter","Missions / Missionary"],
    salvation:["Teresa & Tobert Alday","Arleen Almazan","Nicole Ropero","Gerry Marpa","Michael Marpa","Juwie"],
    bible:    ["ZMI","Eleventh Hour Workers Training Center — Palawan"]
  },
  gov:{
    executive:  ["President","Vice President","DOJ","PNP","AFP","Marines","Air Force","Ombudsman"],
    legislative:["Congress","Senate"],
    judiciary:  ["Supreme Court"]
  },
  economy:["God's blessings for the Philippine economy","Business owners and investors","Wisdom, integrity & stewardship for those in charge","Farmers and fishermen","Prayer against corruption","Job opportunities"],
  edu:    ["Secretary of DepEd","Prayer against corruption","School heads","Teachers","Students"],
  health: ["Health workers","PhilHealth","Health budget"],
  media:  ["Responsible journalism","Parental guidance"]
};

var data, activeTab, editMode;

function init() {
  try { var s=localStorage.getItem('ucc-prayer-v3'); data=s?JSON.parse(s):deep(DEFAULT); }
  catch(e) { data=deep(DEFAULT); }
  activeTab='family'; editMode=false; draw();
}
function deep(o)  { return JSON.parse(JSON.stringify(o)); }
function save()   { try{localStorage.setItem('ucc-prayer-v3',JSON.stringify(data));}catch(e){} }
function esc(s)   { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg,dur){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},dur||2200); }

function setTab(id){ activeTab=id; draw(); var b=document.getElementById('t-'+id); if(b)b.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); }
function toggleEdit(){
  editMode=!editMode;
  var b=document.getElementById('editBtn');
  b.textContent=editMode?'✓ Done':'✏️ Edit';
  b.className='btn-edit'+(editMode?' on':'');
  draw();
}

function draw(){
  var tb='';
  TABS.forEach(function(t){ tb+='<button id="t-'+t.id+'" class="tab'+(activeTab===t.id?' active':'')+'" onclick="setTab(\''+t.id+'\')">'+t.icon+' '+t.label+'</button>'; });
  document.getElementById('tabBar').innerHTML=tb;
  var html='';
  TABS.forEach(function(t){ html+='<div class="panel'+(activeTab===t.id?' active':'')+'">'+buildPanel(t.id)+'</div>'; });
  document.getElementById('content').innerHTML=html;
}

function addRow(inputId,onAdd){
  return '<div class="add-row"><input id="'+inputId+'" type="text" placeholder="Type here..." onkeydown="if(event.key===\'Enter\'){'+onAdd+'}"><button class="btn-add" onclick="'+onAdd+'">Add</button></div>';
}
function itemRow(label,rmCall){
  return '<div class="item-row"><span class="dot">•</span><span class="label">'+label+'</span>'+(rmCall?'<button class="xbtn" onclick="'+rmCall+'">×</button>':'')+'</div>';
}

function buildPanel(id){
  var h='';
  if(editMode) h+='<div class="edit-notice">Tap × to remove · Use Add to add new items</div>';
  if(id==='family'){
    h+='<div class="chip-grid">';
    data.families.forEach(function(f,i){ h+='<span class="chip">'+esc(f)+(editMode?'<button class="xbtn" onclick="rmFam('+i+')">×</button>':'')+'</span>'; });
    h+='</div>';
    if(editMode) h+=addRow('inp-fam','addFam()');
    return h;
  }
  if(id==='church'){
    [{k:'general',l:'General'},{k:'salvation',l:'Salvation & Total Conversion'},{k:'bible',l:'Bible Schools'}].forEach(function(g){
      h+='<div class="group-block"><div class="grp-label">'+g.l+'</div>';
      data.church[g.k].forEach(function(x,i){ h+=itemRow(esc(x),editMode?'rmChurch(\''+g.k+'\','+i+')':null); });
      if(editMode) h+=addRow('inp-ch-'+g.k,'addChurch(\''+g.k+'\')');
      h+='</div>';
    });
    return h;
  }
  if(id==='gov'){
    [{k:'executive',l:'Executive'},{k:'legislative',l:'Legislative'},{k:'judiciary',l:'Judiciary'}].forEach(function(g){
      h+='<div class="group-block"><div class="grp-label">'+g.l+'</div>';
      data.gov[g.k].forEach(function(x,i){ h+=itemRow(esc(x),editMode?'rmGov(\''+g.k+'\','+i+')':null); });
      if(editMode) h+=addRow('inp-gov-'+g.k,'addGov(\''+g.k+'\')');
      h+='</div>';
    });
    return h;
  }
  data[id].forEach(function(x,i){ h+=itemRow(esc(x),editMode?'rmSimple(\''+id+'\','+i+')':null); });
  if(editMode) h+=addRow('inp-'+id,'addSimple(\''+id+'\')');
  return h;
}

/* ── EDIT ── */
function getVal(id){ var e=document.getElementById(id); return e?e.value.trim():''; }
function rmFam(i)       { data.families.splice(i,1); save(); draw(); }
function addFam()       { var v=getVal('inp-fam'); if(!v)return; data.families.push(v); save(); draw(); toast('✓ Added'); }
function rmChurch(k,i)  { data.church[k].splice(i,1); save(); draw(); }
function addChurch(k)   { var v=getVal('inp-ch-'+k); if(!v)return; data.church[k].push(v); save(); draw(); toast('✓ Added'); }
function rmGov(k,i)     { data.gov[k].splice(i,1); save(); draw(); }
function addGov(k)      { var v=getVal('inp-gov-'+k); if(!v)return; data.gov[k].push(v); save(); draw(); toast('✓ Added'); }
function rmSimple(id,i) { data[id].splice(i,1); save(); draw(); }
function addSimple(id)  { var v=getVal('inp-'+id); if(!v)return; data[id].push(v); save(); draw(); toast('✓ Added'); }

/* ── COPY ── */
function copyText(){
  var t='🙏 UCC PASAY — PRAYER REQUESTS 🙏\n\n';
  t+='👨‍👩‍👧 FAMILY — Divine Preservation\n'; data.families.forEach(function(f){t+='• '+f+'\n';});
  t+='\n⛪ CHURCH\n[General]\n'; data.church.general.forEach(function(x){t+='• '+x+'\n';});
  t+='[Salvation & Conversion]\n'; data.church.salvation.forEach(function(x){t+='• '+x+'\n';});
  t+='[Bible Schools]\n'; data.church.bible.forEach(function(x){t+='• '+x+'\n';});
  t+='\n🏛️ GOVERNMENT\n[Executive]\n'; data.gov.executive.forEach(function(x){t+='• '+x+'\n';});
  t+='[Legislative]\n'; data.gov.legislative.forEach(function(x){t+='• '+x+'\n';});
  t+='[Judiciary]\n'; data.gov.judiciary.forEach(function(x){t+='• '+x+'\n';});
  t+='\n💼 ECONOMY & BUSINESS\n'; data.economy.forEach(function(x){t+='• '+x+'\n';});
  t+='\n📚 EDUCATION\n'; data.edu.forEach(function(x){t+='• '+x+'\n';});
  t+='\n❤️ HEALTH SECTOR\n'; data.health.forEach(function(x){t+='• '+x+'\n';});
  t+='\n📺 MEDIA & ARTS\n'; data.media.forEach(function(x){t+='• '+x+'\n';});
  t+='\n— Please keep these in prayer. God bless! 🙏';
  function fb(){ var ta=document.createElement('textarea'); ta.value=t; ta.style.cssText='position:fixed;opacity:0;top:0;left:0'; document.body.appendChild(ta); ta.focus(); ta.select(); try{document.execCommand('copy');toast('✓ Copied! Paste in Viber / WhatsApp');}catch(e){} document.body.removeChild(ta); }
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(function(){toast('✓ Copied! Paste in Viber / WhatsApp');}).catch(fb); } else { fb(); }
}

/* ── PRINT / PDF ── */
function buildPrintGrid(){
  function sec(hdr,body){ return '<div class="ps"><div class="ps-hdr">'+hdr+'</div><div class="ps-body">'+body+'</div></div>'; }
  function grp(label,items){ var h=label?'<div class="ps-grp"><div class="ps-glabel">'+label+'</div>':'<div class="ps-grp">'; items.forEach(function(x){h+='<div class="ps-item"><span class="ps-dot">•</span>'+esc(x)+'</div>';}); return h+'</div>'; }
  var html='';
  var chips='<div class="ps-chips">'; data.families.forEach(function(f){chips+='<span class="ps-chip">'+esc(f)+'</span>';}); chips+='</div>';
  html+=sec('👨‍👩‍👧 Family — Divine Preservation', chips);
  html+=sec('⛪ Church', grp('General',data.church.general)+grp('Salvation & Total Conversion',data.church.salvation)+grp('Bible Schools',data.church.bible));
  html+=sec('🏛️ Government', grp('Executive',data.gov.executive)+grp('Legislative',data.gov.legislative)+grp('Judiciary',data.gov.judiciary));
  html+=sec('💼 Economy & Business', grp('',data.economy));
  html+=sec('📚 Education', grp('',data.edu));
  html+=sec('❤️ Health Sector', grp('',data.health));
  html+=sec('📺 Media & Arts', grp('',data.media));
  document.getElementById('printGrid').innerHTML=html;
}
function printPDF(){ buildPrintGrid(); setTimeout(function(){window.print();},80); }

/* ── PPT ── */
function generatePPT(){
  toast('Loading PPT generator...',5000);
  if(typeof PptxGenJS!=='undefined'){buildPPT();return;}
  var s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js';
  s.onload=buildPPT;
  s.onerror=function(){toast('No internet — PPT needs a connection once.');};
  document.head.appendChild(s);
}

function buildPPT(){
  toast('Building slides...',6000);
  var pptx=new PptxGenJS();
  pptx.layout='LAYOUT_WIDE';
  pptx.title='UCC Pasay Prayer Requests';

  var W=13.33, H=7.5;
  var N='0C447C', R='185FA5', B='378ADD', P='B5D4F4', F='E6F1FB', BG='EDF4FB';
  var CF='Calibri';

  function hdr(slide,emoji,title){
    slide.addShape(pptx.ShapeType.rect,{x:0,y:0,w:W,h:1.05,fill:{color:N}});
    slide.addText(emoji+'  '+title,{x:0.4,y:0,w:W-0.8,h:1.05,fontFace:CF,fontSize:22,color:'FFFFFF',bold:true,valign:'middle'});
    slide.addShape(pptx.ShapeType.rect,{x:0,y:1.05,w:W,h:H-1.05,fill:{color:BG}});
  }
  function glabel(slide,text,x,y,w){
    slide.addText(text.toUpperCase(),{x:x,y:y,w:w,h:0.26,fontFace:CF,fontSize:9,color:R,bold:true});
    slide.addShape(pptx.ShapeType.rect,{x:x,y:y+0.25,w:w,h:0.018,fill:{color:P}});
  }
  function blist(slide,items,x,y,w,lh){
    lh=lh||0.42;
    items.forEach(function(item,i){
      slide.addText([{text:'• ',options:{color:B,bold:true}},{text:item,options:{color:'1a2a3a'}}],
        {x:x,y:y+i*lh,w:w,h:lh,fontFace:CF,fontSize:13,valign:'middle',wrap:true});
    });
    return y+items.length*lh;
  }

  /* Slide 1 — Title */
  var s1=pptx.addSlide();
  s1.addShape(pptx.ShapeType.rect,{x:0,y:0,w:W,h:H,fill:{color:N}});
  s1.addText('🙏',{x:0,y:1.3,w:W,h:1.3,fontSize:60,align:'center'});
  s1.addText('Prayer Requests',{x:1.5,y:2.7,w:W-3,h:1.0,fontFace:CF,fontSize:42,color:'FFFFFF',bold:true,align:'center'});
  s1.addText('United Church of Christ in the Philippines — Pasay',{x:1,y:3.85,w:W-2,h:0.55,fontFace:CF,fontSize:16,color:'85B7EB',align:'center'});
  s1.addText('Prayer Meeting',{x:1,y:4.5,w:W-2,h:0.45,fontFace:CF,fontSize:13,color:P,align:'center'});

  /* Slide 2 — Family */
  var s2=pptx.addSlide();
  hdr(s2,'👨‍👩‍👧','FAMILY — Divine Preservation');
  var cols=4, rows=Math.ceil(data.families.length/cols), tbl=[];
  for(var r=0;r<rows;r++){
    var row=[];
    for(var c=0;c<cols;c++){
      var idx=r*cols+c, nm=idx<data.families.length?data.families[idx]:'';
      row.push({text:nm,options:{fill:{color:nm?F:BG},color:N,fontSize:11,bold:!!nm,align:'center',
        border:[{type:'solid',pt:0.5,color:P},{type:'solid',pt:0.5,color:P},{type:'solid',pt:0.5,color:P},{type:'solid',pt:0.5,color:P}]
      }});
    }
    tbl.push(row);
  }
  s2.addTable(tbl,{x:0.35,y:1.25,w:12.63,rowH:0.52,fontFace:CF,colW:[3.15,3.15,3.15,3.18]});

  /* Slide 3 — Church */
  var s3=pptx.addSlide(); hdr(s3,'⛪','CHURCH');
  var cy=1.28;
  glabel(s3,'General',0.4,cy,12.5); cy+=0.32; cy=blist(s3,data.church.general,0.4,cy,12.5)+0.14;
  glabel(s3,'Salvation & Total Conversion',0.4,cy,12.5); cy+=0.32; cy=blist(s3,data.church.salvation,0.4,cy,12.5)+0.14;
  glabel(s3,'Bible Schools',0.4,cy,12.5); cy+=0.32; blist(s3,data.church.bible,0.4,cy,12.5);

  /* Slide 4 — Government */
  var s4=pptx.addSlide(); hdr(s4,'🏛️','GOVERNMENT');
  var gy=1.28;
