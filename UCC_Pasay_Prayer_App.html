<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UCC Pasay – Prayer Requests</title>
<style>
:root {
  --navy:  #0C447C;
  --royal: #185FA5;
  --blue:  #378ADD;
  --sky:   #85B7EB;
  --pale:  #B5D4F4;
  --frost: #E6F1FB;
  --bg:    #F0F6FF;
  --white: #FFFFFF;
  --text:  #1a2a3a;
  --card:  #FFFFFF;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; overflow: hidden; }

body {
  font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
}

/* ─── APP SHELL ─── */
.app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  height: 100vh;
  max-width: 480px;
  margin: 0 auto;
}

/* ─── HEADER ─── */
.hdr {
  flex-shrink: 0;
  background: var(--navy);
  padding: 11px 16px 9px;
  text-align: center;
}
.hdr-org  { font-size: 9px; letter-spacing: 0.12em; color: var(--sky); text-transform: uppercase; margin-bottom: 2px; }
.hdr-name { font-size: 17px; font-weight: 700; color: #fff; }

/* ─── TAB BAR ─── */
.tab-bar {
  flex-shrink: 0;
  background: var(--white);
  border-bottom: 1.5px solid var(--pale);
  display: flex;
  gap: 5px;
  padding: 8px 10px;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.tab-bar::-webkit-scrollbar { display: none; }

.tab {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 13px;
  border-radius: 20px;
  border: 1.5px solid var(--pale);
  background: var(--frost);
  color: var(--royal);
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.tab.active {
  background: var(--royal);
  border-color: var(--royal);
  color: #fff;
}

/* ─── CONTENT ─── */
.content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 11px 8px;
}

.panel { display: none; }
.panel.active { display: block; }

/* ─── GROUP LABEL ─── */
.grp-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--royal);
  padding: 10px 2px 5px;
  border-bottom: 1.5px solid var(--pale);
  margin-bottom: 7px;
}
.grp-label:first-child { padding-top: 0; }
.group-block { margin-bottom: 12px; }

/* ─── CHIPS (family names) ─── */
.chip-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--navy);
  background: var(--frost);
  border: 1px solid var(--pale);
  border-radius: 20px;
  padding: 5px 12px;
}
.chip .xbtn {
  background: none; border: none;
  color: #A32D2D; cursor: pointer;
  font-size: 16px; line-height: 1; padding: 0 0 0 3px;
}

/* ─── ITEM ROWS ─── */
.item-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 9px 11px;
  background: var(--card);
  border-radius: 9px;
  border: 1px solid #EBF3FB;
  margin-bottom: 5px;
}
.dot   { color: var(--blue); font-size: 18px; line-height: 1.1; flex-shrink: 0; }
.label { font-size: 13.5px; flex: 1; line-height: 1.4; }
.item-row .xbtn {
  background: none; border: none;
  color: #A32D2D; cursor: pointer;
  font-size: 18px; line-height: 1; flex-shrink: 0;
}

/* ─── ADD ROW ─── */
.add-row {
  display: flex;
  gap: 6px;
  margin-top: 9px;
  padding-top: 9px;
  border-top: 1px dashed var(--pale);
}
.add-row input {
  flex: 1;
  padding: 8px 13px;
  border: 1.5px solid var(--pale);
  border-radius: 22px;
  font-size: 13px;
  color: var(--text);
  background: white;
  outline: none;
}
.add-row input:focus { border-color: var(--royal); }
.add-row .btn-add {
  padding: 8px 16px;
  background: var(--royal);
  color: white;
  border: none;
  border-radius: 22px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}

/* ─── EDIT NOTICE ─── */
.edit-notice {
  background: #FFF8E1;
  border: 1px solid #FFD54F;
  border-radius: 8px;
  padding: 7px 12px;
  font-size: 12px;
  color: #6D4C00;
  text-align: center;
  margin-bottom: 11px;
}

/* ─── BOTTOM BAR ─── */
.btm {
  flex-shrink: 0;
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  background: white;
  border-top: 1.5px solid var(--pale);
}
.btn-copy {
  flex: 1.4;
  padding: 12px 8px;
  background: var(--royal);
  color: white;
  border: none;
  border-radius: 26px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.01em;
}
.btn-edit {
  flex: 1;
  padding: 12px 8px;
  background: var(--frost);
  color: var(--royal);
  border: 1.5px solid var(--pale);
  border-radius: 26px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}
.btn-edit.on { background: var(--navy); color: white; border-color: var(--navy); }

/* ─── TOAST ─── */
.toast {
  position: fixed;
  bottom: 86px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--navy);
  color: white;
  padding: 10px 22px;
  border-radius: 24px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  transition: opacity 0.25s;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="app">

  <div class="hdr">
    <div class="hdr-org">United Church of Christ in the Philippines — Pasay</div>
    <div class="hdr-name">🙏 Prayer Requests</div>
  </div>

  <div class="tab-bar" id="tabBar"></div>

  <div class="content" id="content"></div>

  <div class="btm">
    <button class="btn-copy" onclick="copyText()">📋 Copy to Share</button>
    <button class="btn-edit" id="editBtn" onclick="toggleEdit()">✏️ Edit</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
var TABS = [
  { id:'family',  label:'Family',     icon:'👨‍👩‍👧' },
  { id:'church',  label:'Church',     icon:'⛪'      },
  { id:'gov',     label:'Government', icon:'🏛️'     },
  { id:'economy', label:'Economy',    icon:'💼'      },
  { id:'edu',     label:'Education',  icon:'📚'      },
  { id:'health',  label:'Health',     icon:'❤️'      },
  { id:'media',   label:'Media',      icon:'📺'      }
];

var DEFAULT = {
  families: [
    "Del Rosario","Torno","Nogaliza Kenner","Mahilum-Buyan","Dela Cruz",
    "Bance","Gimeno-Azarcon","Daraman-Saludes","Pangadlin","Banhao",
    "Hamsinon","Dela Pena","Movido","Talbo-Aldohesa","Banghaon-Esporas",
    "Alday","Ropero","Almazan","Bagayo","Guimbo-Galapon","Roxas",
    "Badbad","Pelinio-Pasigay","Villaceran","Rebada","Enriquez",
    "Ysulan","Dequina","Bacho-Crisostomo","Dalusong Joyce","Padernal",
    "Barrilea-Tugade","Lapara"
  ],
  church: {
    general:    ["UCC Group of Churches","Revival","Personal Encounter","Missions / Missionary"],
    salvation:  ["Teresa & Tobert Alday","Arleen Almazan","Nicole Ropero","Gerry Marpa","Michael Marpa","Juwie"],
    bible:      ["ZMI","Eleventh Hour Workers Training Center — Palawan"]
  },
  gov: {
    executive:  ["President","Vice President","DOJ","PNP","AFP","Marines","Air Force","Ombudsman"],
    legislative:["Congress","Senate"],
    judiciary:  ["Supreme Court"]
  },
  economy: ["God's blessings for the Philippine economy","Business owners and investors","Wisdom, integrity & stewardship for those in charge","Farmers and fishermen","Prayer against corruption","Job opportunities"],
  edu:     ["Secretary of DepEd","Prayer against corruption","School heads","Teachers","Students"],
  health:  ["Health workers","PhilHealth","Health budget"],
  media:   ["Responsible journalism","Parental guidance"]
};

var data, activeTab, editMode;

function init() {
  try {
    var s = localStorage.getItem('ucc-prayer-v3');
    data = s ? JSON.parse(s) : deep(DEFAULT);
  } catch(e) { data = deep(DEFAULT); }
  activeTab = 'family';
  editMode  = false;
  draw();
}

function deep(o) { return JSON.parse(JSON.stringify(o)); }
function save()  { try { localStorage.setItem('ucc-prayer-v3', JSON.stringify(data)); } catch(e) {} }

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── TABS ── */
function setTab(id) {
  activeTab = id;
  draw();
  var btn = document.getElementById('t-'+id);
  if (btn) btn.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
}

function toggleEdit() {
  editMode = !editMode;
  var b = document.getElementById('editBtn');
  b.textContent = editMode ? '✓ Done' : '✏️ Edit';
  b.className = 'btn-edit' + (editMode ? ' on' : '');
  draw();
}

/* ── MAIN DRAW ── */
function draw() {
  // Tab bar
  var tbHtml = '';
  TABS.forEach(function(t) {
    tbHtml += '<button id="t-'+t.id+'" class="tab'+(activeTab===t.id?' active':'')+'" onclick="setTab(\''+t.id+'\')">'
      + t.icon + ' ' + t.label + '</button>';
  });
  document.getElementById('tabBar').innerHTML = tbHtml;

  // Content
  var html = '';
  TABS.forEach(function(t) {
    html += '<div class="panel'+(activeTab===t.id?' active':'')+'">';
    html += buildPanel(t.id);
    html += '</div>';
  });
  document.getElementById('content').innerHTML = html;
}

function addRow(inputId, onAdd) {
  return '<div class="add-row">'
    + '<input id="'+inputId+'" type="text" placeholder="Type here..." onkeydown="if(event.key===\'Enter\'){'+onAdd+'}">'
    + '<button class="btn-add" onclick="'+onAdd+'">Add</button>'
    + '</div>';
}

function buildPanel(id) {
  var h = '';
  if (editMode) h += '<div class="edit-notice">Tap × to remove an item. Use Add to add new ones.</div>';

  if (id === 'family') {
    h += '<div class="chip-grid">';
    data.families.forEach(function(f, i) {
      h += '<span class="chip">'+esc(f);
      if (editMode) h += '<button class="xbtn" onclick="rmFam('+i+')">×</button>';
      h += '</span>';
    });
    h += '</div>';
    if (editMode) h += addRow('inp-fam', 'addFam()');
    return h;
  }

  if (id === 'church') {
    var cGroups = [
      { k:'general',   l:'General' },
      { k:'salvation', l:'Salvation & Total Conversion' },
      { k:'bible',     l:'Bible Schools' }
    ];
    cGroups.forEach(function(g) {
      h += '<div class="group-block"><div class="grp-label">'+g.l+'</div>';
      data.church[g.k].forEach(function(x, i) {
        h += itemRow(esc(x), editMode ? 'rmChurch(\''+g.k+'\','+i+')' : null);
      });
      if (editMode) h += addRow('inp-ch-'+g.k, 'addChurch(\''+g.k+'\')');
      h += '</div>';
    });
    return h;
  }

  if (id === 'gov') {
    var gGroups = [
      { k:'executive',   l:'Executive' },
      { k:'legislative', l:'Legislative' },
      { k:'judiciary',   l:'Judiciary' }
    ];
    gGroups.forEach(function(g) {
      h += '<div class="group-block"><div class="grp-label">'+g.l+'</div>';
      data.gov[g.k].forEach(function(x, i) {
        h += itemRow(esc(x), editMode ? 'rmGov(\''+g.k+'\','+i+')' : null);
      });
      if (editMode) h += addRow('inp-gov-'+g.k, 'addGov(\''+g.k+'\')');
      h += '</div>';
    });
    return h;
  }

  // Simple list tabs
  data[id].forEach(function(x, i) {
    h += itemRow(esc(x), editMode ? 'rmSimple(\''+id+'\','+i+')' : null);
  });
  if (editMode) h += addRow('inp-'+id, 'addSimple(\''+id+'\')');
  return h;
}

function itemRow(label, rmCall) {
  return '<div class="item-row">'
    + '<span class="dot">•</span>'
    + '<span class="label">'+label+'</span>'
    + (rmCall ? '<button class="xbtn" onclick="'+rmCall+'">×</button>' : '')
    + '</div>';
}

/* ── EDIT ACTIONS ── */
function getVal(id) {
  var el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

function rmFam(i)           { data.families.splice(i,1); save(); draw(); }
function addFam()           { var v=getVal('inp-fam'); if(!v) return; data.families.push(v); save(); draw(); toast('✓ Added'); }

function rmChurch(k,i)      { data.church[k].splice(i,1); save(); draw(); }
function addChurch(k)       { var v=getVal('inp-ch-'+k); if(!v) return; data.church[k].push(v); save(); draw(); toast('✓ Added'); }

function rmGov(k,i)         { data.gov[k].splice(i,1); save(); draw(); }
function addGov(k)          { var v=getVal('inp-gov-'+k); if(!v) return; data.gov[k].push(v); save(); draw(); toast('✓ Added'); }

function rmSimple(id,i)     { data[id].splice(i,1); save(); draw(); }
function addSimple(id)      { var v=getVal('inp-'+id); if(!v) return; data[id].push(v); save(); draw(); toast('✓ Added'); }

/* ── COPY ── */
function copyText() {
  var t = '🙏 UCC PASAY — PRAYER REQUESTS 🙏\n\n';
  t += '👨‍👩‍👧 FAMILY — Divine Preservation\n';
  data.families.forEach(function(f){ t += '• '+f+'\n'; });

  t += '\n⛪ CHURCH\n';
  t += '[General]\n';          data.church.general.forEach(function(x){ t+='• '+x+'\n'; });
  t += '[Salvation & Conversion]\n'; data.church.salvation.forEach(function(x){ t+='• '+x+'\n'; });
  t += '[Bible Schools]\n';    data.church.bible.forEach(function(x){ t+='• '+x+'\n'; });

  t += '\n🏛️ GOVERNMENT\n';
  t += '[Executive]\n';        data.gov.executive.forEach(function(x){ t+='• '+x+'\n'; });
  t += '[Legislative]\n';      data.gov.legislative.forEach(function(x){ t+='• '+x+'\n'; });
  t += '[Judiciary]\n';        data.gov.judiciary.forEach(function(x){ t+='• '+x+'\n'; });

  t += '\n💼 ECONOMY & BUSINESS\n'; data.economy.forEach(function(x){ t+='• '+x+'\n'; });
  t += '\n📚 EDUCATION\n';     data.edu.forEach(function(x){ t+='• '+x+'\n'; });
  t += '\n❤️ HEALTH SECTOR\n'; data.health.forEach(function(x){ t+='• '+x+'\n'; });
  t += '\n📺 MEDIA & ARTS\n';  data.media.forEach(function(x){ t+='• '+x+'\n'; });
  t += '\n— Please keep these in prayer. God bless! 🙏';

  function doFallback() {
    var ta = document.createElement('textarea');
    ta.value = t; ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand('copy'); toast('✓ Copied! Paste in Viber / WhatsApp'); }
    catch(e) { alert('Long-press and Copy the text manually.'); }
    document.body.removeChild(ta);
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(t)
      .then(function(){ toast('✓ Copied! Paste in Viber / WhatsApp'); })
      .catch(doFallback);
  } else { doFallback(); }
}

init();
</script>
</body>
</html>
